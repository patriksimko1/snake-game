<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐍 Snake Hra</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  h1 {
    color: #fff;
    font-size: clamp(1.4rem, 5vw, 2rem);
    margin-bottom: 6px;
    text-shadow: 0 0 20px #a855f7;
    letter-spacing: 2px;
  }

  #score-board {
    display: flex;
    gap: 24px;
    margin-bottom: 10px;
  }

  .score-item {
    text-align: center;
  }

  .score-label {
    color: #a78bfa;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .score-value {
    color: #fff;
    font-size: 1.4rem;
    font-weight: bold;
  }

  #canvas-wrap {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 40px #7c3aed88, 0 0 80px #7c3aed33;
    border: 3px solid #7c3aed;
  }

  canvas {
    display: block;
    background: #0f0720;
  }

  /* Overlay screens */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(15, 7, 32, 0.92);
    border-radius: 13px;
    gap: 14px;
  }

  .overlay.hidden { display: none; }

  .overlay-emoji { font-size: 3rem; }

  .overlay h2 {
    color: #fff;
    font-size: clamp(1.2rem, 5vw, 1.8rem);
    text-align: center;
  }

  .overlay p {
    color: #a78bfa;
    font-size: 0.95rem;
    text-align: center;
    padding: 0 20px;
  }

  .btn {
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 36px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 4px 20px #7c3aed66;
    letter-spacing: 1px;
  }

  .btn:active { transform: scale(0.95); }
  .btn:hover { box-shadow: 0 4px 30px #a855f799; }

  /* D-pad controls */
  #controls {
    margin-top: 14px;
    display: grid;
    grid-template-areas:
      ". up ."
      "left . right"
      ". down .";
    gap: 6px;
  }

  .dpad-btn {
    width: 58px;
    height: 58px;
    background: rgba(124, 58, 237, 0.25);
    border: 2px solid #7c3aed;
    border-radius: 14px;
    color: #fff;
    font-size: 1.5rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .dpad-btn:active {
    background: rgba(124, 58, 237, 0.7);
    transform: scale(0.92);
  }

  #btn-up    { grid-area: up; }
  #btn-left  { grid-area: left; }
  #btn-right { grid-area: right; }
  #btn-down  { grid-area: down; }

  #pause-btn {
    margin-top: 10px;
    background: rgba(124, 58, 237, 0.2);
    border: 2px solid #7c3aed;
    border-radius: 50px;
    color: #a78bfa;
    font-size: 0.9rem;
    padding: 8px 24px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  #pause-btn:active { background: rgba(124, 58, 237, 0.5); }
</style>
</head>
<body>

<h1>🐍 SNAKE</h1>

<div id="score-board">
  <div class="score-item">
    <div class="score-label">Skóre</div>
    <div class="score-value" id="score">0</div>
  </div>
  <div class="score-item">
    <div class="score-label">Rekord</div>
    <div class="score-value" id="best">0</div>
  </div>
  <div class="score-item">
    <div class="score-label">Úroveň</div>
    <div class="score-value" id="level">1</div>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="c"></canvas>

  <!-- Start screen -->
  <div class="overlay" id="start-screen">
    <div class="overlay-emoji">🐍</div>
    <h2>Snake Hra</h2>
    <p>Zbieraj jedlo, vyhýbaj sa stenám a vlastnému chvostu!</p>
    <button class="btn" onclick="startGame()">▶ HRAŤ</button>
  </div>

  <!-- Game Over screen -->
  <div class="overlay hidden" id="gameover-screen">
    <div class="overlay-emoji">💀</div>
    <h2>Koniec hry!</h2>
    <p id="go-score"></p>
    <button class="btn" onclick="startGame()">🔄 Znova</button>
  </div>

  <!-- Pause screen -->
  <div class="overlay hidden" id="pause-screen">
    <div class="overlay-emoji">⏸️</div>
    <h2>Pauza</h2>
    <button class="btn" onclick="togglePause()">▶ Pokračovať</button>
  </div>
</div>

<!-- D-pad -->
<div id="controls">
  <button class="dpad-btn" id="btn-up"    ontouchstart="setDir(0,-1)" onclick="setDir(0,-1)">⬆️</button>
  <button class="dpad-btn" id="btn-left"  ontouchstart="setDir(-1,0)" onclick="setDir(-1,0)">⬅️</button>
  <button class="dpad-btn" id="btn-right" ontouchstart="setDir(1,0)"  onclick="setDir(1,0)">➡️</button>
  <button class="dpad-btn" id="btn-down"  ontouchstart="setDir(0,1)"  onclick="setDir(0,1)">⬇️</button>
</div>

<button id="pause-btn" onclick="togglePause()">⏸ Pauza / Pokračovať</button>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Responsive size
const CELL = 20;
const COLS = Math.floor(Math.min(window.innerWidth - 20, 360) / CELL);
const ROWS = Math.floor(Math.min(window.innerHeight * 0.45, 340) / CELL);
canvas.width  = COLS * CELL;
canvas.height = ROWS * CELL;

// State
let snake, dir, nextDir, food, bonus, score, best, level, speed, loop, paused, alive;

// Food emojis
const FOODS = ['🍎','🍊','🍋','🍇','🍓','🫐','🍉','🍑','🥝','🍒'];
const BONUS_FOODS = ['⭐','💎','🌟','🔥'];

function rnd(max) { return Math.floor(Math.random() * max); }

function freeCell() {
  let pos;
  do { pos = { x: rnd(COLS), y: rnd(ROWS) }; }
  while (snake.some(s => s.x === pos.x && s.y === pos.y));
  return pos;
}

function spawnFood() {
  food = { ...freeCell(), emoji: FOODS[rnd(FOODS.length)] };
}

function spawnBonus() {
  if (Math.random() < 0.3) {
    bonus = { ...freeCell(), emoji: BONUS_FOODS[rnd(BONUS_FOODS.length)], ttl: 60 };
  }
}

function startGame() {
  hide('start-screen'); hide('gameover-screen'); hide('pause-screen');
  snake = [
    { x: Math.floor(COLS/2),   y: Math.floor(ROWS/2) },
    { x: Math.floor(COLS/2)-1, y: Math.floor(ROWS/2) },
    { x: Math.floor(COLS/2)-2, y: Math.floor(ROWS/2) },
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  level = 1;
  speed = 180;
  paused = false;
  alive = true;
  bonus = null;
  best = parseInt(localStorage.getItem('snakeBest') || '0');
  updateUI();
  spawnFood();
  clearInterval(loop);
  loop = setInterval(tick, speed);
}

function setDir(dx, dy) {
  // Prevent reversing
  if (dx === -dir.x && dy === -dir.y) return;
  nextDir = { x: dx, y: dy };
}

function togglePause() {
  if (!alive) return;
  paused = !paused;
  if (paused) { show('pause-screen'); clearInterval(loop); }
  else        { hide('pause-screen'); loop = setInterval(tick, speed); }
}

function tick() {
  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

  snake.unshift(head);

  // Eat food
  if (head.x === food.x && head.y === food.y) {
    score += 10 * level;
    checkLevel();
    updateUI();
    spawnFood();
    spawnBonus();
  } else {
    snake.pop();
  }

  // Eat bonus
  if (bonus) {
    bonus.ttl--;
    if (head.x === bonus.x && head.y === bonus.y) {
      score += 50 * level;
      updateUI();
      bonus = null;
    } else if (bonus.ttl <= 0) {
      bonus = null;
    }
  }

  draw();
}

function checkLevel() {
  const newLevel = Math.floor(score / 100) + 1;
  if (newLevel > level) {
    level = newLevel;
    speed = Math.max(60, 180 - (level - 1) * 18);
    clearInterval(loop);
    loop = setInterval(tick, speed);
  }
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
  if (score > best) {
    best = score;
    localStorage.setItem('snakeBest', best);
  }
  document.getElementById('best').textContent = best;
}

function gameOver() {
  alive = false;
  clearInterval(loop);
  updateUI();
  document.getElementById('go-score').textContent =
    `Skóre: ${score} | Rekord: ${best}`;
  show('gameover-screen');
}

// --- Drawing ---
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawGrid();
  drawFood();
  drawBonus();
  drawSnake();
}

function drawGrid() {
  ctx.strokeStyle = 'rgba(124,58,237,0.07)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,canvas.height); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(canvas.width,y*CELL); ctx.stroke();
  }
}

function drawFood() {
  ctx.font = `${CELL-2}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(food.emoji, food.x*CELL + CELL/2, food.y*CELL + CELL/2);
}

function drawBonus() {
  if (!bonus) return;
  // Blink when ttl low
  if (bonus.ttl < 20 && bonus.ttl % 4 < 2) return;
  ctx.font = `${CELL}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(bonus.emoji, bonus.x*CELL + CELL/2, bonus.y*CELL + CELL/2);
}

function drawSnake() {
  snake.forEach((seg, i) => {
    const x = seg.x * CELL, y = seg.y * CELL;
    const r = CELL / 2 - 1;

    if (i === 0) {
      // Head gradient
      const grad = ctx.createRadialGradient(x+r+1,y+r+1,1,x+r+1,y+r+1,r+2);
      grad.addColorStop(0, '#f0abfc');
      grad.addColorStop(1, '#a855f7');
      ctx.fillStyle = grad;
    } else {
      // Body gradient green→teal
      const t = i / snake.length;
      ctx.fillStyle = lerpColor('#22d3ee', '#4ade80', t);
    }

    // Rounded rect
    roundRect(ctx, x+1, y+1, CELL-2, CELL-2, 5);
    ctx.fill();

    // Eyes on head
    if (i === 0) {
      ctx.fillStyle = '#1a0a2e';
      const ex = dir.x, ey = dir.y;
      const cx2 = x + CELL/2, cy2 = y + CELL/2;
      // Two eyes offset perpendicular to direction
      const px = ey, py = -ex; // perpendicular
      ctx.beginPath();
      ctx.arc(cx2 + ex*3 + px*4, cy2 + ey*3 + py*4, 2, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx2 + ex*3 - px*4, cy2 + ey*3 - py*4, 2, 0, Math.PI*2);
      ctx.fill();
    }
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function lerpColor(a, b, t) {
  const ah = parseInt(a.slice(1),16), bh = parseInt(b.slice(1),16);
  const ar = ah>>16, ag = (ah>>8)&0xff, ab = ah&0xff;
  const br = bh>>16, bg = (bh>>8)&0xff, bb = bh&0xff;
  const rr = Math.round(ar + (br-ar)*t);
  const rg = Math.round(ag + (bg-ag)*t);
  const rb = Math.round(ab + (bb-ab)*t);
  return `rgb(${rr},${rg},${rb})`;
}

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

// Keyboard
document.addEventListener('keydown', e => {
  const map = {
    ArrowUp:    [0,-1], ArrowDown:  [0,1],
    ArrowLeft:  [-1,0], ArrowRight: [1,0],
    w: [0,-1], s: [0,1], a: [-1,0], d: [1,0],
  };
  if (map[e.key]) { e.preventDefault(); setDir(...map[e.key]); }
  if (e.key === 'p' || e.key === 'Escape') togglePause();
});

// Swipe support
let tx=0, ty=0;
canvas.addEventListener('touchstart', e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; }, {passive:true});
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy)) setDir(dx>0?1:-1, 0);
  else setDir(0, dy>0?1:-1);
}, {passive:true});
</script>
</body>
</html>
